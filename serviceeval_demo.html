<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>【デモ】接客評価システム</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@600&display=swap');
:root{--blue:#0056A8;--pink:#db2777;--pink-dark:#9d174d;--pink-light:#fce7f3;--gold:#F4A300;
--green:#16a34a;--green-light:#dcfce7;--amber:#d97706;--red:#dc2626;
--white:#fff;--gray-50:#f8f9fc;--gray-100:#eef1f7;--gray-200:#e2e6ef;--gray-300:#c4cad8;--gray-500:#7a8299;--gray-700:#414a63;--gray-900:#1a1e2e;--radius:14px;--shadow:0 4px 24px rgba(0,86,168,.10)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh;-webkit-text-size-adjust:100%}
.demo-banner{background:linear-gradient(90deg,#f59e0b,#d97706);padding:10px 20px;text-align:center;position:sticky;top:0;z-index:300;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.demo-badge{background:#fff;color:#92400e;font-size:11px;font-weight:900;padding:3px 10px;border-radius:5px;letter-spacing:1px}
.demo-text{color:#fff;font-size:12px;font-weight:700}
.site-header{background:linear-gradient(135deg,var(--pink-dark),var(--pink));padding:14px 20px;position:sticky;top:44px;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.2)}
.site-header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.site-logo{background:var(--white);border-radius:7px;padding:5px 9px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;color:var(--pink);line-height:1.3;text-align:center}
.site-title{color:var(--white);font-size:15px;font-weight:700}.site-sub{color:rgba(255,255,255,.6);font-size:10px;margin-top:1px}
.wrap{max-width:720px;margin:0 auto;padding:18px}
.field{margin-bottom:14px}.field label{display:block;font-size:12px;font-weight:700;color:var(--gray-700);margin-bottom:6px}
select{width:100%;padding:11px 12px;border:1.5px solid var(--gray-300);border-radius:10px;font-family:inherit;font-size:14px;background:var(--white);-webkit-appearance:none;appearance:none}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.q{padding:12px 0;border-bottom:1px solid var(--gray-100)}.q:last-of-type{border-bottom:0}
.q-txt{font-size:13.5px;font-weight:700;margin-bottom:8px}
.stars{display:flex;gap:6px}
.star{font-size:28px;cursor:pointer;color:var(--gray-200);transition:transform .1s}
.star.on{color:var(--gold)}.star:hover{transform:scale(1.15)}
.result{background:linear-gradient(135deg,var(--pink-dark),var(--pink));border-radius:var(--radius);padding:20px;color:#fff;text-align:center;margin-bottom:16px;display:none}
.result .score{font-size:44px;font-weight:900;font-family:'Oswald',sans-serif;line-height:1}
.result .score small{font-size:18px;opacity:.8}
.result .lab{font-size:13px;font-weight:700;margin-top:6px}
.comment{background:var(--pink-light);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--pink-dark);font-weight:700;line-height:1.6;margin-top:14px;text-align:left}
.submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:#fff;border:0;border-radius:12px;font-family:inherit;font-size:15px;font-weight:900;cursor:pointer}
.submit:disabled{opacity:.5;cursor:not-allowed}
.foot{text-align:center;padding:16px 18px 40px;color:var(--gray-500);font-size:12px;line-height:1.9}
.foot a{color:var(--pink);font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div class="demo-banner"><span class="demo-badge">DEMO</span><span class="demo-text">これはサンプル画面です。評価は保存されません。</span></div>
<header class="site-header"><div class="site-header-inner">
  <div class="site-logo">コンビニ<br>現場改善ラボ</div>
  <div style="flex:1;min-width:150px"><div class="site-title">接客評価システム</div><div class="site-sub">巡回時の接客チェックを、その場でスコア化</div></div>
</div></header>
<div class="wrap">
  <div class="result" id="result">
    <div class="score" id="scoreVal">0<small>/100</small></div>
    <div class="lab" id="scoreLab"></div>
    <div class="comment" id="comment"></div>
  </div>
  <div class="card" id="formCard">
    <div class="field"><label>評価対象スタッフ</label>
      <select id="staff"><option>サンプル 太郎（さくら台店）</option><option>サンプル 花子（緑丘店）</option><option>グエン さん（中央駅前店）</option></select>
    </div>
    <div id="questions"></div>
    <button class="submit" id="btn" disabled onclick="submit()">評価を確定する</button>
  </div>
  <div class="foot">── コンビニ現場改善ラボのサンプルデモ ──<br>実際はスタッフ別・店舗別にスコアが集計され、良い接客の共有と指導に使えます。<br><a href="tools.html">← ツール一覧へもどる</a> ｜ <a href="https://note.com/convenience_lab" target="_blank">noteで問い合わせる</a></div>
</div>
<script>
const items=['明るい第一声・あいさつ','アイコンタクトと笑顔','レジ操作の正確さ・速さ','ひと言の声かけ（お気遣い）','最後の見送り（ありがとうございました）'];
const scores=new Array(items.length).fill(0);
document.getElementById('questions').innerHTML=items.map((q,qi)=>`
  <div class="q"><div class="q-txt">${qi+1}. ${q}</div>
  <div class="stars">${[1,2,3,4,5].map(v=>`<span class="star" data-q="${qi}" data-v="${v}" onclick="rate(${qi},${v})">★</span>`).join('')}</div></div>`).join('');
function rate(qi,v){
  scores[qi]=v;
  document.querySelectorAll(`.star[data-q="${qi}"]`).forEach(s=>s.classList.toggle('on',+s.dataset.v<=v));
  document.getElementById('btn').disabled=scores.some(s=>s===0);
}
function submit(){
  const total=Math.round(scores.reduce((a,b)=>a+b,0)/(items.length*5)*100);
  const lab=total>=90?'素晴らしい接客です！':total>=75?'良好。あと一歩でお手本レベル':total>=60?'合格ライン。伸びしろあり':'重点的にフォローが必要';
  const low=items[scores.indexOf(Math.min(...scores))];
  document.getElementById('scoreVal').innerHTML=total+'<small>/100</small>';
  document.getElementById('scoreLab').textContent=lab;
  document.getElementById('comment').textContent='💡 次の重点ポイント：「'+low+'」を意識すると、さらに印象が良くなります。';
  document.getElementById('formCard').style.display='none';
  document.getElementById('result').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
