<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>【デモ】MS清掃改善管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@600&display=swap');
:root{--blue:#0056A8;--teal:#0891b2;--teal-dark:#155e75;--teal-light:#cffafe;
--green:#16a34a;--green-light:#dcfce7;--amber:#d97706;--red:#dc2626;
--white:#fff;--gray-50:#f8f9fc;--gray-100:#eef1f7;--gray-200:#e2e6ef;--gray-300:#c4cad8;--gray-500:#7a8299;--gray-700:#414a63;--gray-900:#1a1e2e;--radius:14px;--shadow:0 4px 24px rgba(0,86,168,.10)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh;-webkit-text-size-adjust:100%}
.demo-banner{background:linear-gradient(90deg,#f59e0b,#d97706);padding:10px 20px;text-align:center;position:sticky;top:0;z-index:300;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.demo-badge{background:#fff;color:#92400e;font-size:11px;font-weight:900;padding:3px 10px;border-radius:5px;letter-spacing:1px}
.demo-text{color:#fff;font-size:12px;font-weight:700}
.site-header{background:linear-gradient(135deg,var(--teal-dark),var(--teal));padding:14px 20px;position:sticky;top:44px;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.2)}
.site-header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.site-logo{background:var(--white);border-radius:7px;padding:5px 9px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;color:var(--teal-dark);line-height:1.3;text-align:center}
.site-title{color:var(--white);font-size:15px;font-weight:700}.site-sub{color:rgba(255,255,255,.6);font-size:10px;margin-top:1px}
.wrap{max-width:720px;margin:0 auto;padding:18px}
.ring-wrap{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px;display:flex;align-items:center;gap:18px}
.ring{width:88px;height:88px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:600;font-size:22px;color:var(--teal-dark)}
.ring b{background:var(--white);width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.ring-txt .t{font-size:14px;font-weight:900;color:var(--teal-dark)}
.ring-txt .s{font-size:11px;color:var(--gray-500);margin-top:3px;line-height:1.6}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:8px 4px;margin-bottom:16px}
.item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--gray-100)}
.item:last-child{border-bottom:0}
.item-main{flex:1}.item-name{font-size:13.5px;font-weight:700}.item-freq{font-size:10px;color:var(--gray-500);font-weight:700;margin-top:2px}
.seg{display:flex;gap:4px}
.seg button{width:38px;height:32px;border-radius:8px;border:1.5px solid var(--gray-200);background:var(--white);font-family:inherit;font-size:15px;font-weight:900;cursor:pointer;color:var(--gray-300)}
.seg button.ok.on{background:var(--green-light);border-color:var(--green);color:var(--green)}
.seg button.na.on{background:#fef9c3;border-color:var(--amber);color:var(--amber)}
.seg button.ng.on{background:#fee2e2;border-color:var(--red);color:var(--red)}
.foot{text-align:center;padding:24px 18px 40px;color:var(--gray-500);font-size:12px;line-height:1.9}
.foot a{color:var(--teal-dark);font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div class="demo-banner"><span class="demo-badge">DEMO</span><span class="demo-text">これはサンプル画面です。内容はすべてダミーです。</span></div>
<header class="site-header"><div class="site-header-inner">
  <div class="site-logo">コンビニ<br>現場改善ラボ</div>
  <div style="flex:1;min-width:150px"><div class="site-title">MS清掃改善管理</div><div class="site-sub">清掃箇所のチェックと達成率を、その場で記録</div></div>
</div></header>
<div class="wrap">
  <div class="ring-wrap">
    <div class="ring" id="ring"><b id="ringVal">0%</b></div>
    <div class="ring-txt"><div class="t">本日の清掃 達成率</div><div class="s" id="ringSub">各箇所を「○＝完了 / △＝一部 / ×＝未」で入力。<br>タップして状態を切り替えてください。</div></div>
  </div>
  <div class="card" id="list"></div>
  <div class="foot">── コンビニ現場改善ラボのサンプルデモ ──<br>実際は店舗ごとの達成率が記録され、清掃の抜け漏れと改善傾向を把握できます。<br><a href="tools.html">← ツール一覧へもどる</a> ｜ <a href="https://note.com/convenience_lab" target="_blank">noteで問い合わせる</a></div>
</div>
<script>
const areas=[
  {n:'店内トイレ',freq:'2時間ごと',v:2},
  {n:'売場の床',freq:'開店前・随時',v:2},
  {n:'什器・棚',freq:'1日1回',v:1},
  {n:'厨房・調理機器',freq:'使用後',v:2},
  {n:'イートイン',freq:'随時',v:0},
  {n:'店頭・駐車場',freq:'1日2回',v:1},
  {n:'ゴミ回収',freq:'随時',v:2},
];
function render(){
  document.getElementById('list').innerHTML=areas.map((a,i)=>`
    <div class="item"><div class="item-main"><div class="item-name">${a.n}</div><div class="item-freq">${a.freq}</div></div>
    <div class="seg">
      <button class="ok ${a.v===2?'on':''}" onclick="set(${i},2)">○</button>
      <button class="na ${a.v===1?'on':''}" onclick="set(${i},1)">△</button>
      <button class="ng ${a.v===0?'on':''}" onclick="set(${i},0)">×</button>
    </div></div>`).join('');
  const rate=Math.round(areas.reduce((s,a)=>s+a.v,0)/(areas.length*2)*100);
  document.getElementById('ringVal').textContent=rate+'%';
  const col=rate>=80?'#16a34a':rate>=50?'#d97706':'#dc2626';
  document.getElementById('ring').style.background=`conic-gradient(${col} ${rate*3.6}deg, #e2e6ef 0deg)`;
}
function set(i,v){areas[i].v=v;render();}
render();
</script>
</body>
</html>
